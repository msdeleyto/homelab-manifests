nameOverride: jackett
fullnameOverride: jackett

image:
  repository: linuxserver/jackett
  tag: 0.24.2219@sha256:209f4a6bc65f605f259745790373db5b14c4dee565d419e09a1b5e70d2464d44

serviceAccount:
  create: false

service:
  type: ClusterIP
  ports:
  - name: http
    port: 9117
    targetPort: http
    protocol: TCP

ports:
- name: http
  containerPort: 9117
  protocol: TCP

httpRoute:
  enabled: true
  parentRefs:
  - name: cluster-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    sectionName: https
    namespace: network
  hostnames:
  - "jackett.${INFRA_DOMAIN}"
  port: 9117
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

livenessProbe: null
readinessProbe: null

storage:
  create: true
  name: jackett-config
  className: longhorn
  accessModes:
  - ReadWriteMany
  size: 1Gi

env:
- name: PUID
  value: "1000"
- name: PGID
  value: "1000"

volumes:
- name: config
  persistentVolumeClaim:
    claimName: jackett-config

volumeMounts:
- name: config
  mountPath: /config

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: node-role.kubernetes.io/control-plane
          operator: NotIn
          values:
          - "true"
