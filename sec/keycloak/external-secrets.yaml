apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin-credentials-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-admin-credentials
  data:
  - secretKey: KEYCLOAK_ADMIN
    remoteRef:
      key: /sec/keycloak
      property: adminUsername
  - secretKey: KEYCLOAK_ADMIN_PASSWORD
    remoteRef:
      key: /sec/keycloak
      property: adminPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-db-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-db-secret
    template:
      type: kubernetes.io/basic-auth
      data:
        username: keycloak
        password: "{{ .password }}"
  data:
  - secretKey: password
    remoteRef:
      key: /sec/keycloak
      property: dbPassword
