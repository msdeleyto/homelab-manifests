apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin-credentials-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-admin-credentials
  data:
  - secretKey: KC_BOOTSTRAP_ADMIN_USERNAME
    remoteRef:
      key: /sec/keycloak
      property: adminUsername
  - secretKey: KC_BOOTSTRAP_ADMIN_PASSWORD
    remoteRef:
      key: /sec/keycloak
      property: adminPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-db-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-db-secret
    template:
      type: kubernetes.io/basic-auth
      data:
        username: keycloak
        password: "{{ .password }}"
  data:
  - secretKey: password
    remoteRef:
      key: /sec/keycloak
      property: dbPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-config-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-config
    manifest:
      apiVersion: v1
      kind: ConfigMap
    template:
      data:
        cluster-realm.json: |
          {
            "enabled": true,
            "realm": "cluster-realm",
            "clients": [
              {
                "clientId": "moped-client",
                "enabled": true,
                "publicClient": true,
                "redirectUris": ["*"]
              }
            ]
          }
  data:
  - secretKey: KC_BOOTSTRAP_ADMIN_USERNAME
    remoteRef:
      key: /sec/keycloak
      property: adminUsername
