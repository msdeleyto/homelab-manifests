apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin-credentials-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-admin-credentials
  data:
  - secretKey: KC_BOOTSTRAP_ADMIN_USERNAME
    remoteRef:
      key: /sec/keycloak
      property: adminUsername
  - secretKey: KC_BOOTSTRAP_ADMIN_PASSWORD
    remoteRef:
      key: /sec/keycloak
      property: adminPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-config-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-config
    manifest:
      apiVersion: v1
      kind: ConfigMap
    template:
      data:
        cluster-realm.json: |
          {
            "enabled": true,
            "realm": "cluster",
            "users": [
              {
                "username": "admin",
                "email": "admin@example.com",
                "enabled": true,
                "firstName": "Admin",
                "lastName": "User",
                "credentials": [
                  {
                    "type": "password",
                    "value": "{{ .adminPassword }}"
                  }
                ],
                "clientRoles": {
                  "gateway": [
                    "admin"
                  ]
                }
              },
              {
                "username": "m.media",
                "email": "m.media@example.com",
                "enabled": true,
                "firstName": "Media",
                "lastName": "User",
                "credentials": [
                  {
                    "type": "password",
                    "value": "{{ .mediaPassword }}"
                  }
                ],
                "clientRoles": {
                  "gateway": [
                    "media"
                  ]
                }
              }
            ],
            "clients": [
              {
                "clientId": "gateway",
                "name": "gateway",
                "description": "Gateway Client",
                "enabled": true,
                "clientAuthenticatorType": "client-secret",
                "secret": "{{ .clientSecret }}",
                "redirectUris": [
                  "https://hubble.${INFRA_DOMAIN}/*"
                ],
                "webOrigins": ["*"],
                "authorizationServicesEnabled" : true
              }
            ],
            "clientScopes" : [
              {
                "name" : "profile",
                "protocolMappers" : [
                  {
                    "name" : "roles",
                    "protocol" : "openid-connect",
                    "protocolMapper" : "oidc-usermodel-client-role-mapper",
                    "config" : {
                      "introspection.token.claim" : "true",
                      "multivalued" : "true",
                      "userinfo.token.claim" : "true",
                      "id.token.claim" : "true",
                      "lightweight.claim" : "false",
                      "access.token.claim" : "true",
                      "claim.name" : "roles",
                      "jsonType.label" : "String",
                      "usermodel.clientRoleMapping.clientId" : "gateway"
                    }
                  }
                ]
              }
            ],
            "roles": {
              "client": {
                "gateway": [
                  {
                    "name": "admin",
                    "clientRole": true
                  },
                  {
                    "name": "media",
                    "clientRole": true
                  }
                ]
              }
            }
          }
  data:
  - secretKey: adminPassword
    remoteRef:
      key: /sec/keycloak
      property: adminPassword
  - secretKey: mediaPassword
    remoteRef:
      key: /sec/keycloak
      property: mediaPassword
  - secretKey: clientSecret
    remoteRef:
      key: /sec/keycloak
      property: clientSecret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-db-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-db-secret
    template:
      type: kubernetes.io/basic-auth
      data:
        username: keycloak
        password: "{{ .password }}"
  data:
  - secretKey: password
    remoteRef:
      key: /sec/keycloak
      property: dbPassword
