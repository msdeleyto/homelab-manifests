apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-config
data:
  oauth2_proxy.yml: |
    server:
      bindAddress: "0.0.0.0:4180"

    upstreamConfig:
      upstreams:
        - id: static-200
          path: "/"
          static: true
          staticCode: 200

    providers:
      - id: keycloak
        provider: oidc
        clientID: "oauth2-proxy"
        code_challenge_method: S256
        oidcConfig:
          issuerURL: "https://keycloak.${INFRA_DOMAIN}/auth/realms/cluster"
          userIDClaim: "username"
        additionalClaims:
          - username
          - roles

    injectResponseHeaders:
      - name: X-Auth-Request-User
        values:
          - claimSource:
              claim: username
      - name: X-Auth-Request-Roles
        values:
          - claimSource:
              claim: roles
