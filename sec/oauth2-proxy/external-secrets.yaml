apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-config-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-config
    manifest:
      apiVersion: v1
      kind: ConfigMap
    template:
      data:
        oauth2_proxy.cfg: |
          reverse_proxy = true
          cookie_secret = "{{ .cookieSecret }}"
          cookie_domains = ".${INFRA_DOMAIN}"
          cookie_httponly = false
          cookie_csrf_per_request = true
          cookie_csrf_expire = "5m"
          whitelist_domains = [".${INFRA_DOMAIN}"]
          email_domains = ["gmail.com"]

          client_id = "oauth2-proxy"
          client_secret = "{{ .clientSecret }}"
          cookie_secure = true

          redirect_url = "https://oauth2-proxy.${INFRA_DOMAIN}/oauth2/callback"

          upstreams = [ "static://200" ]

          set_xauthrequest = true
          provider = "keycloak-oidc"
          oidc_issuer_url = "https://keycloak.${INFRA_DOMAIN}/auth/realms/cluster"
          code_challenge_method = "S256"
          user_id_claim = "username"
  data:
  - secretKey: clientSecret
    remoteRef:
      key: /sec/keycloak
      property: clientSecret
  - secretKey: cookieSecret
    remoteRef:
      key: /sec/oauth2proxy
      property: cookieSecret
