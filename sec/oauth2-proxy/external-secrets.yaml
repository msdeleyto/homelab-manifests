apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-config-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-config
    manifest:
      apiVersion: v1
      kind: ConfigMap
    template:
      data:
        oauth2_proxy.yml: |
          server:
            bindAddress: '0.0.0.0:4180'

          upstreamConfig:
            upstreams:
            - id: static-200
              path: "/"
              static: true
              staticCode: 200

          providers:
          - id: keycloak
            provider: oidc
            clientID: "oauth2-proxy"
            clientSecret: "{{ .clientSecret }}"
            code_challenge_method: S256
            oidcConfig:
              issuerURL: "https://keycloak.${INFRA_DOMAIN}/auth/realms/cluster"
              userIDClaim: "username"
            additionalClaims:
            - username
            - roles

          injectRequestHeaders:
          - name: X-Auth-Request-User
            values:
            - claimSource:
                claim: username
          - name: X-Auth-Request-Roles
            values:
            - claimSource:
                claim: roles
  data:
  - secretKey: clientSecret
    remoteRef:
      key: /sec/keycloak
      property: clientSecret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-cookie-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-cookie-secret
  data:
  - secretKey: OAUTH2_PROXY_COOKIE_SECRET
    remoteRef:
      key: /sec/oauth2proxy
      property: cookieSecret
