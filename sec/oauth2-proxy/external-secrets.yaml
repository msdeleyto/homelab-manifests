apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-config-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-config
    manifest:
      apiVersion: v1
      kind: ConfigMap
    template:
      data:
        oauth2_proxy.cfg: |
          cookie_secret = "0GFSg3hvyA9a5Q3U6MxkE-Q-KTPq-K8MxpKVgRkAAdI="
          cookie_domains = ".${INFRA_DOMAIN}"
          whitelist_domains = [".${INFRA_DOMAIN}"]
          email_domains = ["gmail.com"]

          client_id = "oauth2-proxy"
          client_secret = "{{ .clientSecret }}"
          cookie_secure = false

          redirect_url = "http://oauth2-proxy.${INFRA_DOMAIN}/oauth2/callback"

          upstreams = [ "file:///dev/null" ]

          set_xauthrequest = true
          provider = "keycloak-oidc"
          oidc_issuer_url = "https://keycloak.${INFRA_DOMAIN}/auth/realms/cluster"
  data:
  - secretKey: clientSecret
    remoteRef:
      key: /sec/keycloak
      property: clientSecret
