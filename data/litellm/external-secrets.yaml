apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-db-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: litellm-db-secret
    template:
      type: kubernetes.io/basic-auth
      data:
        username: litellm
        password: "{{ .password }}"
  data:
  - secretKey: password
    remoteRef:
      key: /data/litellm
      property: dbPassword
