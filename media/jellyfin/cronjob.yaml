apiVersion: batch/v1
kind: CronJob
metadata:
  name: jellyfin-backup
spec:
  schedule: "0 15 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          automountServiceAccountToken: false
          containers:
          - name: backup
            image: busybox:1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
            command:
            - /bin/sh
            - -c
            - |
              echo "Starting backup at $(date)"
              tar -czf /backup/jellyfin-$(date +%Y%m%d%H%M%S).tar.gz /config
              echo "Backup completed at $(date)"

              echo "Removing backups older than 3 days"
              find /backup -maxdepth 1 -mtime +3 -type f -delete
            volumeMounts:
            - name: backup
              mountPath: /backup
            - name: config
              mountPath: /config
              readOnly: true
          restartPolicy: OnFailure
          volumes:
          - name: config
            persistentVolumeClaim:
              claimName: jellyfin
          - name: backup
            nfs:
              server: nas.homelab
              path: /volume1/prod/backup/jellyfin
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                  - key: app
                    operator: In
                    values:
                    - jellyfin
                topologyKey: kubernetes.io/hostname
