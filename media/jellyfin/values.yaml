pvc:
  storageClassName: longhorn
  accessModes:
  - ReadWriteOnce
  size: 10Gi

deployment:
  image:
    repository: docker.io/jellyfin/jellyfin
    tag: "10.11.11@sha256:aefb67e6a7ff1debdd154a78a7bbb780fd0c873d8639210a7f6a2016ad2b35db"

backup:
  schedule: "0 15 * * *"
  image:
    repository: busybox
    tag: "1.38@sha256:b6762ddf4a50aabb5f4d21aa6f447d05d5633fb09f09c08b33f22356a2f98be0"
  command: |
    echo "Starting backup at $(date)"
    tar -czf /backup/jellyfin-$(date +%Y%m%d%H%M%S).tar.gz /config
    echo "Backup completed at $(date)"
    echo "Removing backups older than 3 days"
    find /backup -maxdepth 1 -mtime +3 -type f -delete
