nameOverride: jellyfin
fullnameOverride: jellyfin

image:
  repository: docker.io/jellyfin/jellyfin
  tag: "10.11.11@sha256:aefb67e6a7ff1debdd154a78a7bbb780fd0c873d8639210a7f6a2016ad2b35db"

serviceAccount:
  create: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 100
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

service:
  port: 8096

httpRoute:
  enabled: true
  parentRefs:
  - name: cluster-gateway
    sectionName: https
    namespace: network
  hostnames:
  - "jellyfin.${INFRA_DOMAIN}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

resources:
  limits:
    ephemeral-storage: 32Gi
  requests:
    ephemeral-storage: 16Gi

volumes:
- name: config
  persistentVolumeClaim:
    claimName: jellyfin-config-pvc
- name: data
  nfs:
    server: nas.homelab
    path: /volume1/data/media

volumeMounts:
- mountPath: /config
  name: config
- name: data
  mountPath: /data/media

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: node-role.kubernetes.io/control-plane
          operator: NotIn
          values:
          - "true"
