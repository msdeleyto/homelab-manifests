nameOverride: yubal
fullnameOverride: yubal

image:
  repository: ghcr.io/guillevc/yubal
  tag: 0.9.1@sha256:6701297d9390fac4b1e7b28a916e2552423173ae29e2f562a55af4c14a58859a

serviceAccount:
  create: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 100
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP

ports:
- name: http
  containerPort: 8000
  protocol: TCP

httpRoute:
  enabled: true
  parentRefs:
  - name: cluster-gateway
    group: gateway.networking.k8s.io
    kind: Gateway
    sectionName: https
    namespace: network
  hostnames:
  - "yubal.${INFRA_DOMAIN}"
  port: 8000
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

livenessProbe:
  httpGet:
    path: /_stcore/health
    port: http

storage:
  create: true
  name: yubal-config
  className: longhorn
  accessModes:
  - ReadWriteOnce
  size: 1Gi

env:
- name: YUBAL_AUDIO_FORMAT
  value: "opus"
- name: YUBAL_AUDIO_QUALITY
  value: "0"
- name: YUBAL_SCHEDULER_ENABLED
  value: "true"
- name: YUBAL_SCHEDULER_CRON
  value: "0 0 * * *"
- name: YUBAL_FETCH_LYRICS
  value: "false"
- name: YUBAL_DOWNLOAD_UGC
  value: "false"
- name: YUBAL_REPLAYGAIN
  value: "true"
- name: YUBAL_JOB_TIMEOUT_SECONDS
  value: "1800"
- name: YUBAL_TZ
  value: "UTC"
- name: YUBAL_HOST
  value: "0.0.0.0"
- name: YUBAL_PORT
  value: "8000"
- name: YUBAL_DATA
  value: "/app/data"
- name: YUBAL_CONFIG
  value: "/app/config"
- name: YUBAL_LOG_LEVEL
  value: "INFO"
- name: YUBAL_ASCII_FILENAMES
  value: "false"
- name: YUBAL_TEMP
  value: "/tmp"
- name: YUBAL_CORS_ORIGINS
  value: "[\"*.${INFRA_DOMAIN}\"]"

volumes:
- name: config
  persistentVolumeClaim:
    claimName: yubal-config
- name: data
  nfs:
    server: nas.homelab
    path: /volume1/data/media/music

volumeMounts:
- name: config
  mountPath: /app/config
- name: data
  mountPath: /app/data

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: node-role.kubernetes.io/control-plane
          operator: NotIn
          values:
          - "true"
