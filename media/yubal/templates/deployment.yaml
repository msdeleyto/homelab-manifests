apiVersion: apps/v1
kind: Deployment
metadata:
  name: yubal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yubal
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: yubal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: NotIn
                values:
                - "true"
      containers:
      - name: yubal
        image: {{ .Values.deployment.image.repository }}:{{ .Values.deployment.image.tag }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: YUBAL_HOST
          value: "0.0.0.0"
        - name: YUBAL_AUDIO_FORMAT
          value: "opus"
        - name: YUBAL_AUDIO_QUALITY
          value: "0"
        - name: YUBAL_SCHEDULER_ENABLED
          value: "true"
        - name: YUBAL_SCHEDULER_CRON
          value: "0 0 * * *"
        - name: YUBAL_FETCH_LYRICS
          value: "false"
        - name: YUBAL_DOWNLOAD_UGC
          value: "false"
        - name: YUBAL_REPLAYGAIN
          value: "true"
        - name: YUBAL_JOB_TIMEOUT_SECONDS
          value: "1800"
        - name: YUBAL_TZ
          value: "UTC"
        - name: YUBAL_HOST
          value: "127.0.0.1"
        - name: YUBAL_PORT
          value: "8000"
        - name: YUBAL_DATA
          value: "/app/data"
        - name: YUBAL_CONFIG
          value: "/app/config"
        - name: YUBAL_LOG_LEVEL
          value: "INFO"
        - name: YUBAL_ASCII_FILENAMES
          value: "false"
        - name: YUBAL_TEMP
          value: "/tmp"
        - name: YUBAL_CORS_ORIGINS
          value: "[\"*.${INFRA_DOMAIN}\"]"
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: data
          mountPath: /app/data
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: yubal-config
      - name: data
        nfs:
          server: nas.homelab
          path: /volume1/data/media/music
