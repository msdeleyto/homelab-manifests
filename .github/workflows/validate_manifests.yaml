name: Validate Kubernetes Manifests

on:
  pull_request:
  push:
    branches:
    - main
    paths:
    - '**/*.yaml'
    - '**/*.yml'

permissions: {}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-k8s-manifests:
    uses: msdeleyto/gh-actions/.github/workflows/validate-k8s-manifests.yaml@1572e8856aad3454f5c8fc7ab380d2877fd19818 # main

  notify-result:
    runs-on: ubuntu-latest
    needs: validate-k8s-manifests
    if: ${{ always() && github.event_name == 'push' && github.event.sender.login == 'homelab-renovate-app[bot]' }}
    steps:
    - name: Send job result to slack
      uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc # v3.0.5
      with:
        webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
        webhook-type: incoming-webhook
        payload: |
          text: "\"${{ github.event.head_commit.message }}\" was merged to main with result: *${{ needs.validate-k8s-manifests.result }}*"
