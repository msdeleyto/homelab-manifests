name: Validate Kubernetes Manifests

on:
  pull_request:
  push:
    branches:
    - main

permissions: {}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-k8s-manifests:
    uses: msdeleyto/gh-actions/.github/workflows/validate-k8s-manifests.yaml@ec690eda1b005e885dd4b0f6f12c051746801ea5 # main

  notify-result:
    runs-on: ubuntu-latest
    needs: validate-k8s-manifests
    if: ${{ always() && github.event_name == 'push' && github.event.sender.login == 'homelab-renovate-app[bot]' }}
    steps:
    - name: Send job result to slack
      uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
      with:
        webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
        webhook-type: incoming-webhook
        payload: |
          text: "\"${{ github.event.head_commit.message }}\" was merged to main with result: *${{ needs.validate-k8s-manifests.result }}*"
