apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: timescaledb-external-secret
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: timescaledb-secret
    template:
      type: kubernetes.io/basic-auth
      data:
        username: admin
        password: "{{ .password }}"
  data:
  - secretKey: password
    remoteRef:
      key: /monitoring/timescale
      property: password
