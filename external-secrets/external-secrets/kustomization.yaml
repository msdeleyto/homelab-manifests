apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: external-secrets
  repo: https://charts.external-secrets.io
  version: 2.1.0
  releaseName: external-secrets
  namespace: external-secrets
  valuesInline:
    installCRDs: false
    genericTargets:
      enabled: true

resources:
- secret-store.yaml
