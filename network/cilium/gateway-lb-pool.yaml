apiVersion: "cilium.io/v2"
kind: CiliumLoadBalancerIPPool
metadata:
  name: gateway-lb-pool
  namespace: network
spec:
  blocks:
  - cidr: ${INFRA_LB_IP}/32
  - cidr: 192.168.10.10/32 # Test tmp IP
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-policy
  namespace: network
spec:
  serviceSelector:
    matchExpressions:
    - {key: gateway.networking.k8s.io/gateway-name, operator: Exists}
  interfaces:
    - eth0
  externalIPs: true
  loadBalancerIPs: true
