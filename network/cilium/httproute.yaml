apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-route
  namespace: network
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: cluster-gateway
    namespace: network
    sectionName: https
  hostnames:
  - "hubble.${INFRA_DOMAIN}"
  rules:
  - backendRefs:
    - group: ''
      kind: Service
      name: hubble-ui
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: v1
kind: Secret
metadata:
  name: client-secret
stringData:
  client-secret: GdqkY5b99E96JBTrQRsmCekdP0P1Q8ei
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: oidc-test
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hubble-route
  oidc:
    provider:
      issuer: "https://keycloak.${INFRA_DOMAIN}/auth/realms/test"
    clientID: test
    clientSecret:
      name: client-secret
    redirectPath: /oauth2/callback 
