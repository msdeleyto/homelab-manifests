apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: keycloak-oidc
spec:
  targetRefs:
  #- group: gateway.networking.k8s.io
  #  kind: Gateway
  #  name: cluster-gateway
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: hubble-route
  oidc:
    provider:
      issuer: "https://keycloak.${INFRA_DOMAIN}/auth/realms/cluster"
    clientID: gateway
    clientSecret:
      name: client-secret
    logoutPath: "/logout"
