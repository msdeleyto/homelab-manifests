apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: gateway-crds-helm
  repo: oci://docker.io/envoyproxy
  version: v1.7.0
  namespace: network
  valuesFile: values.yaml

- name: gateway-helm
  repo: oci://docker.io/envoyproxy
  version: v1.7.1
  namespace: network

resources:
- envoyproxy.yaml
- gateway.yaml
- security-policy.yaml
