apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: gateway-helm
  repo: oci://docker.io/envoyproxy
  version: 1.8.2
  namespace: network
  valuesFile: values.yaml

resources:
- external-secret.yaml
- envoyproxy.yaml
- gateway.yaml
- security-policies.yaml
- auth-routes.yaml
