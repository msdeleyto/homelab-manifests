apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: gateway-crds-helm
  repo: oci://docker.io/envoyproxy
  version: 1.8.0
  namespace: network
  valuesFile: values.yaml

- name: gateway-helm
  repo: oci://docker.io/envoyproxy
  version: 1.7.3
  namespace: network

resources:
- external-secret.yaml
- envoyproxy.yaml
- gateway.yaml
- security-policies.yaml
- auth-routes.yaml
