apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: oauth2-proxy-traffic-policy
spec:
  headers:
    earlyRequestHeaders:
      set:
      - name: X-Auth-Request-Redirect
        value: https://%REQ(Host)%%REQ(:PATH)%
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: cluster-gateway
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: network-security-policy
  namespace: network
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: hubble-route
  extAuth:
    headersToExtAuth:
    - Cookie
    - X-Auth-Request-User
    - X-Auth-Request-Groups
    - X-Auth-Request-Email
    - X-Auth-Request-Preferred-Username
    - X-Forwarded-Proto
    - X-Forwarded-Host
    - X-Forwarded-Uri
    - X-Auth-Request-Access-Token
    - X-Auth-Request-Redirect
    http:
      backendRefs:
      - group: ""
        kind: Service
        name: oauth2-proxy
        namespace: sec
        port: 80
        weight: 1
      path: /oauth2/auth
---
